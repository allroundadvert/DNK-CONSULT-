    }

    .move-left-right {
        animation: moveLR 4s ease-in-out infinite alternate;
    }
    @keyframes moveLR {
        0% { transform: translateX(0); }
        100% { transform: translateX(20px); }
    }
    .product-table {
        width: 100%;
        border-collapse: collapse;
        margin: 20px 0;
    }
    .product-table th, .product-table td {
        border: 1px solid #ccc;
        padding: 10px;
        text-align: center;
    }
    .product-table th {
        background-color: #FFD700;
    }
    footer {

        text-align: center;
        padding: 10px;
