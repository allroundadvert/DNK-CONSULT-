body{
    margin:0;

    background:#000;
    color:#f5d76e;
}

/* ===== HEADER IMAGE ===== */
header{
    text-align:center;
    padding:15px;
}

header img{
    width:100%;
    max-height:260px;
    object-fit:contain;
    background:#000;
}

header h1{
    margin:10px 0 5px;
}

header p{
    color:#fff;
    font-size:14px;
}

/* ===== MOVING SLIDER (2 IMAGES) ===== */
.moving-slider{
    overflow:hidden;
    background:#000;
    padding:15px 0;
}

.moving-track{
    display:flex;
    width:max-content;
    animation: move 6s linear infinite alternate;
}

.moving-track img{
    height:170px;
    margin:0 12px;
    border:2px solid #f5d76e;
}

@keyframes move{
    0% { transform:translateX(0); }
    50% { transform:translateX(-50px); }
    100% { transform:translateX(0); }
}

/* ===== STATIC GALLERY ===== */
.gallery{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:12px;
    padding:15px;
}

.gallery img{
    width:100%;
    border:2px solid #f5d76e;
}

/* ===== BUTTONS ===== */
.buttons a{
    display:inline-block;
    margin:6px;
    padding:10px 16px;
    background:#f5d76e;
    color:#000;
    text-decoration:none;
    font-weight:bold;
    border-radius:5px;
}

/* ===== FORM ===== */
.container{
    padding:15px;
}

form{
    background:#111;
    border:2px solid #f5d76e;
    padding:20px;
    border-radius:8px;
}

label{
    display:block;
    margin-top:12px;
    font-weight:bold;
}

input, select{
    width:100%;
    padding:8px;
    margin-top:5px;
    border-radius:4px;
    border:none;
}

button{
    width:100%;
    margin-top:18px;
    padding:12px;
    background:#f5d76e;
    color:#000;
    border:none;
    font-weight:bold;
    border-radius:5px;
    cursor:pointer;
}

/* ===== MAP ===== */
.map{
    margin:20px;
    border:2px solid #f5d76e;
}

/* ===== FOOTER ===== */
footer{
    text-align:center;
    padding:15px;
    color:#fff;
    font-size:13px;
}
</style>

<script>
function sendWhatsApp(){
    const name = document.getElementById("cName").value;
    const phone = document.getElementById("cPhone").value;
    const address = document.getElementById("cAddress").value;
    const product = document.getElementById("product").value;
    const delivery = document.getElementById("delivery").value;

    const message = `Hello DNK CONSULT!%0A%0AI would like to make an enquiry:%0A
Name: ${name}%0A
Phone: ${phone}%0A
Address: ${address}%0A
Product: ${product}%0A
Home Delivery: ${delivery}%0A%0AThank you.`;

    window.open(`https://wa.me/2348037947194?text=${message}`, "_blank");
}
</script>
