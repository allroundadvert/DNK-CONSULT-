<title>CLOVER HOME MARBLES AND GRANITE LIMITED</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #fff8e1; /* Gold theme background */
        color: #333;
        margin: 0;
        padding: 0;
    }
    header {
        position: relative;
        text-align: center;
    }
    header img {
        width: 100%;
        height: auto;
        display: block;
    }
    nav {
        background-color: #FFD700; /* Gold theme nav */
        padding: 10px;
        text-align: center;
    }
    nav a {
        margin: 0 15px;
        color: #000;
        text-decoration: none;
        font-weight: bold;
    }
    .image-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
        padding: 10px;
    }
    .image-grid img {
        width: 100%;
        height: auto;
        border-radius: 5px;
    }
    /* Moving animation for first two images */
    .move-left-right {
        animation: moveLR 4s ease-in-out infinite alternate;
    }
    @keyframes moveLR {
        0% { transform: translateX(0); }
        100% { transform: translateX(20px); }
    }
    footer {
        background-color: #FFD700;
        text-align: center;
        padding: 10px;
        position: relative;
    }
</style>
